autoRelease: true
maxContainers: 5
pr: false
preflightCommand: "make precommit"
preflightInterval: "8h"
testCommand: "make test"
validationPrompt: docs/dod.md
workflow: direct
env:
  GOPATH: /home/node/go
  GOCACHE: /home/node/.cache/go-build
  GOLANGCI_LINT_CACHE: /home/node/.cache/golangci-lint
  GO_TEST_PARALLEL: "4"
extraMounts:
  - src: ${GOPATH}/pkg
    dst: /home/node/go/pkg
  - src: ${HOST_CACHE_DIR}/go-build
    dst: /home/node/.cache/go-build
  - src: ${HOST_CACHE_DIR}/golangci-lint
    dst: /home/node/.cache/golangci-lint
